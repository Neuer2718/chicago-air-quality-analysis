# .github/workflows/run-notebook.yml
name: Run Notebook

on: [push]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install jupyter nbconvert pandas numpy matplotlib seaborn scipy
      - name: Run notebook
        run: jupyter nbconvert --to notebook --execute chicago_aqi_analysis.ipynb
